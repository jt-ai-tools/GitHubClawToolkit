name: Commit and push artifacts
description: 將 issue workspace 產生的 artifacts 提交並推送至 issue branch。

inputs:
  issue_number:
    description: Issue 編號，用於 commit message
    required: true
  issue_dir:
    description: Issue 工作目錄（例如 workspaces/issue-123）
    required: true
  branch_name:
    description: 要推送的 branch 名稱
    required: true
  push_token:
    description: 用來 git push 的 GitHub token
    required: true
  git_user_name:
    description: git commit 的 user.name
    required: true
  git_user_email:
    description: git commit 的 user.email
    required: true
  github_repository:
    description: owner/repo
    required: true

runs:
  using: composite
  steps:
    - name: Commit and push artifacts
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.push_token }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        ISSUE_DIR: ${{ inputs.issue_dir }}
        BRANCH_NAME: ${{ inputs.branch_name }}
        PUSH_TOKEN: ${{ inputs.push_token }}
        AUTOMATION_GIT_USER_NAME: ${{ inputs.git_user_name }}
        AUTOMATION_GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
      run: |
        set -euo pipefail

        # 關鍵變數未設定時直接跳過，避免推送空內容。
        if [[ -z "${ISSUE_DIR}" || -z "${BRANCH_NAME}" ]]; then
          echo "工作目錄或分支名稱未設定，略過 artifact commit。"
          exit 0
        fi

        # composite action 不繼承前一 step 的 git 設定，需在此重新指定身分與遠端 URL。
        git config user.name "${AUTOMATION_GIT_USER_NAME}"
        git config user.email "${AUTOMATION_GIT_USER_EMAIL}"
        git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        # 只暫存本次 issue 工作目錄下的產物，不影響其他檔案。
        git add "${ISSUE_DIR}"

        # staging area 無變更則跳過，避免產生空 commit。
        if git diff --cached --quiet -- "${ISSUE_DIR}"; then
          echo "沒有新的 artifact 變更，略過 commit。"
          exit 0
        fi

        # 先在本地建立 artifact commit，後續重演至遠端分支最新頂端再推送。
        git commit -m "chore: record coding agent output for issue #${ISSUE_NUMBER}"

        # 保存剛才的 commit hash 與訊息，供後續重演使用。
        AGENT_COMMIT=$(git rev-parse HEAD)
        AGENT_COMMIT_MESSAGE=$(git log -1 --format=%s "${AGENT_COMMIT}")

        push_succeeded=false
        for attempt in 1 2 3; do
          git fetch origin "${BRANCH_NAME}" || true

          if git show-ref --verify --quiet "refs/remotes/origin/${BRANCH_NAME}"; then
            # 重設至遠端分支頂端，再以 git checkout <commit> -- <dir> 套用 agent commit 的目錄內容。
            # 此做法比 cherry-pick 更穩健：即使遠端曾刪除 workspace 檔案，也不會觸發 CONFLICT (modify/delete)。
            git reset --hard "origin/${BRANCH_NAME}"
            git checkout "${AGENT_COMMIT}" -- "${ISSUE_DIR}"

            # staging area 無差異代表遠端已含等效內容，視為 no-op。
            if git diff --cached --quiet; then
              echo "遠端分支已包含相同的 artifact 內容，無需推送。"
              push_succeeded=true
              break
            fi

            git commit -m "${AGENT_COMMIT_MESSAGE}"
            if git push origin "HEAD:${BRANCH_NAME}"; then
              push_succeeded=true
              break
            fi
          else
            if git push --set-upstream origin "HEAD:${BRANCH_NAME}"; then
              push_succeeded=true
              break
            fi
          fi
          echo "::warning::第 ${attempt}/3 次推送失敗，${attempt * 3} 秒後重試…"
          sleep $((attempt * 3))
        done

        if [ "$push_succeeded" != "true" ]; then
          echo "::error::推送失敗，已重試 3 次仍無法完成。"
          exit 1
        fi
