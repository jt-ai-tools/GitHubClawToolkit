name: 任務失敗處理
description: 從 Copilot CLI 的 JSONL 輸出擷取失敗訊息並寫入結果檔。

inputs:
  output_file:
    description: Copilot CLI 的 JSONL 輸出檔路徑
    required: true
  result_file:
    description: 失敗摘要輸出檔路徑
    required: true
  missing_output_message:
    description: 找不到 output_file 時寫入 result_file 的 fallback 訊息
    required: false
    default: 'Task failed, but output.jsonl was not found.'
  missing_session_error_message:
    description: 找不到 session.error 訊息時寫入 result_file 的 fallback 訊息
    required: false
    default: 'Task failed, but no session.error message was found.'

runs:
  using: composite
  steps:
    - name: 解析失敗輸出並寫入結果檔
      shell: bash
      env:
        OUTPUT_FILE: ${{ inputs.output_file }}
        RESULT_FILE: ${{ inputs.result_file }}
        MISSING_OUTPUT_MESSAGE: ${{ inputs.missing_output_message }}
        MISSING_SESSION_ERROR_MESSAGE: ${{ inputs.missing_session_error_message }}
      run: |
        set -euo pipefail

        mkdir -p "$(dirname "${RESULT_FILE}")"

        node -e '
          const fs = require("fs");

          const outputFile = process.env.OUTPUT_FILE;
          const resultFile = process.env.RESULT_FILE;
          const missingOutputMessage = process.env.MISSING_OUTPUT_MESSAGE;
          const missingSessionErrorMessage = process.env.MISSING_SESSION_ERROR_MESSAGE;

          if (!fs.existsSync(outputFile)) {
            fs.writeFileSync(resultFile, `${missingOutputMessage}\n`);
            process.exit(0);
          }

          const lines = fs.readFileSync(outputFile, "utf8").split(/\r?\n/).filter(Boolean);
          let message = "";

          for (const line of lines) {
            try {
              const entry = JSON.parse(line);
              if (entry.type === "session.error" && typeof entry.data?.message === "string") {
                message = entry.data.message;
              }
            } catch {}
          }

          fs.writeFileSync(
            resultFile,
            `${message || missingSessionErrorMessage}\n`
          );
        '
