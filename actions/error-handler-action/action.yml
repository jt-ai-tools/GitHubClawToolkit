name: 任務失敗處理
description: 從 Copilot CLI 的 JSONL 輸出擷取失敗訊息並寫入結果檔。

inputs:
  output_file:
    description: Copilot CLI 的 JSONL 輸出檔路徑
    required: true
  result_file:
    description: 失敗摘要輸出檔路徑
    required: true
  missing_output_message:
    description: 找不到 output_file 時寫入 result_file 的 fallback 訊息
    required: false
    default: '很抱歉，這個任務沒有順利完成。請通知開發人員檢查：執行記錄檔（output.jsonl）不存在，可能是代理程式啟動失敗或提前中止。'
  missing_session_error_message:
    description: 找不到 session.error 訊息時寫入 result_file 的 fallback 訊息
    required: false
    default: '很抱歉，這個任務沒有順利完成。請通知開發人員檢查：代理程式結束時未留下任何錯誤說明，原因目前不明。'
  message_prefix:
    description: 成功擷取到 session.error 訊息時，寫在訊息上方的說明文字
    required: false
    default: '很抱歉，這個任務沒有順利完成。以下是系統回報的錯誤詳情，請提供給開發人員以利排查：'
  message_suffix:
    description: 成功擷取到 session.error 訊息時，寫在訊息下方的補充文字
    required: false
    default: '若您不確定如何處理，請直接將本頁面的截圖或網址傳送給開發人員。'
  no_auth_message:
    description: 當輸出檔中偵測到認證失敗錯誤時寫入 result_file 的訊息
    required: false
    default: "看起來 Copilot CLI 無法執行，可能是以下原因：\n- 尚未設定 COPILOT_GITHUB_TOKEN 變數\n- 已設定，但金鑰已過期或失效\n\n建議檢查一下相關設定，或重新產生一組新的金鑰後再試一次。"

runs:
  using: composite
  steps:
    - name: 解析失敗輸出並寫入結果檔
      shell: bash
      env:
        OUTPUT_FILE: ${{ inputs.output_file }}
        RESULT_FILE: ${{ inputs.result_file }}
        MISSING_OUTPUT_MESSAGE: ${{ inputs.missing_output_message }}
        MISSING_SESSION_ERROR_MESSAGE: ${{ inputs.missing_session_error_message }}
        MESSAGE_PREFIX: ${{ inputs.message_prefix }}
        MESSAGE_SUFFIX: ${{ inputs.message_suffix }}
        NO_AUTH_MESSAGE: ${{ inputs.no_auth_message }}
      run: |
        set -euo pipefail

        mkdir -p "$(dirname "${RESULT_FILE}")"

        node -e '
          const fs = require("fs");

          const outputFile = process.env.OUTPUT_FILE;
          const resultFile = process.env.RESULT_FILE;
          const missingOutputMessage = process.env.MISSING_OUTPUT_MESSAGE;
          const missingSessionErrorMessage = process.env.MISSING_SESSION_ERROR_MESSAGE;
          const messagePrefix = process.env.MESSAGE_PREFIX;
          const messageSuffix = process.env.MESSAGE_SUFFIX;

          if (!fs.existsSync(outputFile)) {
            fs.writeFileSync(resultFile, `${missingOutputMessage}\n`);
            process.exit(0);
          }

          const content = fs.readFileSync(outputFile, "utf8");

          if (content.includes("Error: No authentication information found.")) {
            fs.writeFileSync(resultFile, `${process.env.NO_AUTH_MESSAGE}\n`);
            process.exit(0);
          }

          const lines = content.split(/\r?\n/).filter(Boolean);
          let message = "";

          for (const line of lines) {
            try {
              const entry = JSON.parse(line);
              if (entry.type === "session.error" && typeof entry.data?.message === "string") {
                message = entry.data.message;
              }
            } catch {}
          }

          fs.writeFileSync(
            resultFile,
            message
              ? `${messagePrefix}\n\n${message}\n\n${messageSuffix}\n`
              : `${missingSessionErrorMessage}\n`
          );
        '
