name: 更新 Issue 留言
description: 以重試邏輯對 GitHub Issue 留言發送 PATCH 請求（不依賴外部腳本）。

inputs:
  comment_id:
    description: 要更新的留言數字 ID。
    required: true
  body:
    description: 留言的純文字內容（允許換行）。
    required: true
  repository:
    description: 儲存庫名稱，格式為「owner/repo」。
    required: true
  token:
    description: 用於驗證 PATCH 請求的 GitHub Token。
    required: true

runs:
  using: composite
  steps:
    - name: 發送 PATCH 請求（含重試）
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        _BODY: ${{ inputs.body }}
        _COMMENT_ID: ${{ inputs.comment_id }}
        _REPOSITORY: ${{ inputs.repository }}
      run: |
        set -euo pipefail

        body_file="${RUNNER_TEMP}/update-issue-comment-body-$$.json"

        # 透過 Node.js 從環境變數讀取 body 並序列化為 JSON，
        # 以安全處理換行、Unicode 及 shell 特殊字元。
        node -e "process.stdout.write(JSON.stringify({body: process.env._BODY}))" \
          > "${body_file}"

        # 發送 PATCH 請求，最多重試 5 次，每次間隔 6 秒。
        attempt=1
        max_attempts=5
        exit_code=0

        while true; do
          if gh api \
               --method PATCH \
               -H 'Accept: application/vnd.github+json' \
               "/repos/${_REPOSITORY}/issues/comments/${_COMMENT_ID}" \
               --input "${body_file}" >/dev/null; then
            rm -f "${body_file}"
            exit 0
          else
            exit_code=$?
          fi

          if (( attempt >= max_attempts )); then
            rm -f "${body_file}"
            exit "${exit_code}"
          fi

          echo "::warning::gh api 失敗（第 ${attempt}/${max_attempts} 次），6 秒後重試..."
          sleep 6
          attempt=$(( attempt + 1 ))
        done
