name: '執行編程 Agent'
description: '針對 Issue 工作區執行 GitHub Copilot 編程 Agent'

inputs:
  issue_dir:
    description: 'Issue 工作區目錄（例如 workspaces/issue-123）'
    required: true
  result_file:
    description: '結果輸出檔路徑'
    required: true
  log_file:
    description: 'Copilot CLI 執行紀錄檔路徑'
    required: true
  copilot_github_token:
    description: 'Copilot CLI 使用的 GitHub Token'
    required: true
  brain_meta:
    description: 'BRAIN_META 標記字串，用於後續系統辨識來源'
    required: false
    default: '<!-- githubclaw-brain-result: {"source":"githubclaw-worker-brain"} -->'
  github_repository:
    description: '目標儲存庫（格式：owner/repo）'
    required: true
  gemini_api_key:
    description: 'Gemini API 金鑰'
    required: false
    default: ''
  felo_api_key:
    description: 'Felo API 金鑰'
    required: false
    default: ''
  tavily_api_key:
    description: 'Tavily API 金鑰'
    required: false
    default: ''
  copilot_home:
    description: 'Copilot 主目錄'
    required: false
    default: '.copilot'
  agent_browser_state:
    description: '瀏覽器狀態檔（用於 Agent 登入持久化）'
    required: false
    default: 'auth.json'

outputs:
  status:
    description: 'Copilot CLI 的退出碼（0 表示成功，非零表示失敗）'
    value: ${{ steps.run.outputs.status }}

runs:
  using: "composite"
  steps:
    - id: run
      name: '執行 Copilot CLI'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.copilot_github_token }}
        GITHUB_TOKEN: ${{ inputs.copilot_github_token }}
        COPILOT_GITHUB_TOKEN: ${{ inputs.copilot_github_token }}
        ISSUE_DIR: ${{ inputs.issue_dir }}
        RESULT_FILE: ${{ inputs.result_file }}
        LOG_FILE: ${{ inputs.log_file }}
        BRAIN_META: ${{ inputs.brain_meta }}
        GITHUB_REPOSITORY: ${{ inputs.github_repository }}
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        NANOBANANA_GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        FELO_API_KEY: ${{ inputs.felo_api_key }}
        TAVILY_API_KEY: ${{ inputs.tavily_api_key }}
        COPILOT_HOME: ${{ inputs.copilot_home }}
        AGENT_BROWSER_STATE: ${{ inputs.agent_browser_state }}
      run: |
        set -euo pipefail

        status=0
        # 確保結果檔所在目錄已存在。
        mkdir -p "$(dirname "${RESULT_FILE}")"

        # 每次執行前先清空輸出檔，避免沿用上一次 run 的殘留內容。
        : > "${RESULT_FILE}"
        : > "${LOG_FILE}"

        # 若 issue workspace 內有使用者自行安裝的 skills，先複製到 repo-root .agents/skills/。
        # 這是純粹的 runner 本機操作，不會 git add/commit，因此不會進入 issue branch。
        if [[ -d "${ISSUE_DIR}/.agents/skills" ]]; then
          for _skill_src in "${ISSUE_DIR}/.agents/skills/"/*/; do
            [[ -d "${_skill_src}" ]] && cp -r "${_skill_src}" .agents/skills/
          done
          unset _skill_src
        fi

        # 暫時關掉 errexit，讓 copilot CLI 失敗時也能手動捕捉 exit code。
        set +e
        (
          cd "${ISSUE_DIR}"
          # 若工作目錄存在 .env，以安全方式解析並載入環境變數（不執行檔案內容）。
          if [[ -f .env ]]; then
            echo "::notice::從 ${ISSUE_DIR}/.env 載入 Copilot CLI 環境變數"
            while IFS= read -r -d '' _env_key && IFS= read -r -d '' _env_value; do
              export "${_env_key}=${_env_value}"
            done < <(node "${{ github.action_path }}/scripts/parse-dotenv-null.mjs" .env)
            unset _env_key _env_value
          fi
          prompt="$(cat issue.md)"
          # 呼叫 copilot CLI，同步將 JSON 輸出寫入 log 檔並印至 stdout。
          copilot -p "${prompt}" --yolo --output-format json --stream off \
            | tee "$(basename "${LOG_FILE}")" \
            | jq
        )
        status=${PIPESTATUS[0]}
        set -e

        # 確保結果檔內一定包含 BRAIN_META，方便後續系統辨識來源。
        if grep -Fq "${BRAIN_META}" "${RESULT_FILE}" 2>/dev/null; then
          true
        elif [[ -s "${RESULT_FILE}" ]]; then
          printf '\n\n%s\n' "${BRAIN_META}" >> "${RESULT_FILE}"
        else
          printf '%s\n' "${BRAIN_META}" > "${RESULT_FILE}"
        fi

        # 將 copilot CLI 的 exit code 傳給後續 step 與整個 workflow。
        echo "status=${status}" >> "$GITHUB_OUTPUT"
        exit "${status}"
