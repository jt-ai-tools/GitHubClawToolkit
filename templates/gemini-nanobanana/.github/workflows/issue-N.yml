# 圖片生成 workflow。
# 使用 Gemini 模型，從根目錄的 issue.md 讀取提示詞，
# 生成圖片並 commit 到 issue branch，最後回寫 issue comment。
#
# 認證模式：僅支援 Gemini API Key（GEMINI_API_KEY secret）。
name: '執行小龍蝦任務 #N'

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to process'
        required: true
        type: string
      comment_id:
        description: 'Existing issue comment ID to reuse for progress updates'
        required: false
        type: string
      user_comment_id:
        description: 'User comment ID used to locate artifacts/{user_comment_id}/user.md'
        required: false
        type: string
      event_source:
        description: 'Who is triggering this workflow: cron or issue'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - cron
          - issue
      event_data:
        description: 'Additional data related to the event that triggered this workflow'
        required: false
        type: string
        default: ''
  repository_dispatch:
    types: [create-image]

run-name: "🎨 圖片生成 Issue #${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"

concurrency:
  group: "create-image-${{ github.repository }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  ISSUE_NUMBER: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_id || inputs.comment_id }}"
  USER_COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.user_comment_id || inputs.user_comment_id }}"
  MODEL: "gemini-3-pro-image-preview"
  GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

jobs:
  run-create-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 把目標 repo 檢出到 runner，切換到對應 issue branch。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: "issue-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
          fetch-depth: 1
          token: "${{ github.token }}"

      # 先把 Node.js 環境準備好。
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 安裝 Bun
      - uses: oven-sh/setup-bun@v2

      # 安裝相關套件
      - run: bun install --no-fund --no-audit @google/genai

      - name: 狀態更新處理
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data == 'StatusUpdate') || inputs.event_data == 'StatusUpdate' }}
        shell: bash
        run: |
          echo "StatusUpdate event detected, performing status update..."

      # ── 執行圖片生成任務 ──────────────────────────────────────────────────
      # 從 issue.md 讀取提示詞，使用 GoogleGenAI SDK 呼叫 Imagen API 生成圖片並儲存到 artifacts 目錄。
      - name: 執行任務
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        id: generate
        shell: bash
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          NANOBANANA_MODEL: ${{ env.MODEL }}
          ISSUE_DIR: "artifacts/${{ env.COMMENT_ID }}"
          SYSTEM_PROMPT_FILE: "./SYSTEM.md"
          TEMPLATE_ROOT: "."
          GENERATE_SCRIPT: "./scripts/generate-image.ts"
          NAME_PREFIX: "image-${{ env.COMMENT_ID || env.ISSUE_NUMBER }}"
          USER_COMMENT_ID: ${{ env.USER_COMMENT_ID }}
        run: |
          set -euo pipefail

          PROMPT_FILE="./artifacts/${USER_COMMENT_ID}/user.md"
          context_jsonl_file="$(find . -maxdepth 1 -type f -name '*.jsonl' | head -n 1 || true)"

          if [[ ! -f "${PROMPT_FILE}" ]]; then
            echo "::error::${PROMPT_FILE} 不存在。請確認 issue branch 已建立 ${ISSUE_DIR}/user.md。"
            exit 1
          fi

          if [[ -z "${context_jsonl_file}" ]]; then
            echo "::error::找不到 issue branch 根目錄 jsonl 檔案。"
            exit 1
          fi

          echo "::notice::將使用 ${PROMPT_FILE} 作為 user prompt"
          output="$(PROMPT_FILE="${PROMPT_FILE}" CONTEXT_JSONL_FILE="${context_jsonl_file}" SYSTEM_PROMPT_FILE="${SYSTEM_PROMPT_FILE}" TEMPLATE_ROOT="${TEMPLATE_ROOT}" ISSUE_DIR="${ISSUE_DIR}" NAME_PREFIX="${NAME_PREFIX}" GEMINI_API_KEY="${GEMINI_API_KEY}" bun run "${GENERATE_SCRIPT}")"
          echo "${output}" | tee ${ISSUE_DIR}/output.txt

          saved_files="$(echo "${output}" | grep '^Saved: ' | sed 's/^Saved: //' | paste -sd ',' -)"

          if [[ -z "${saved_files}" ]]; then
            echo "::error::未找到生成的圖片檔案路徑"
            exit 1
          fi

          echo "saved_files=${saved_files}" >> "$GITHUB_OUTPUT"
          echo "::notice::生成完成：${saved_files}"

          {
            printf '🎨 圖片生成完成！\n\n'
            IFS=',' read -ra files <<< "${saved_files}"
            for f in "${files[@]}"; do
              filename="$(basename "${f}")"
              url="https://github.com/${GITHUB_REPOSITORY}/blob/issue-${ISSUE_NUMBER}/${f}?raw=true"
              printf '![%s](%s)\n\n' "${filename}" "${url}"
            done
          } > "${ISSUE_DIR}/result.md"

      # 推送結果到 issue branch。
      - name: 推送結果
        if: always()
        uses: duotify/GitHubClawToolkit/actions/commit-push-issue-branch-action@v1.1.1
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}

      - name: 任務失敗處理
        if: failure() && steps.generate.conclusion == 'failure'
        uses: duotify/GitHubClawToolkit/actions/error-handler-action@v1.1.1
        with:
          output_file: "artifacts/${{ env.COMMENT_ID }}/output.txt"
          result_file: "artifacts/${{ env.COMMENT_ID }}/result.md"

      - name: 執行結果回報
        if: always()
        uses: duotify/GitHubClawToolkit/actions/update-comment-action@v1.1.1
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}
          comment_id: ${{ env.COMMENT_ID }}
          message_file: "artifacts/${{ env.COMMENT_ID }}/result.md"
