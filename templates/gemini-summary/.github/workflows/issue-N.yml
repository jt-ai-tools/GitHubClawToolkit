# 內容摘要 workflow。
# 使用 Gemini 模型（內嵌 Node.js 腳本），從根目錄的 issue.md 讀取目標 URL 或檔案路徑，
# 生成 Markdown 摘要並 commit 到 issue branch，最後回寫 issue comment。
#
# 認證模式：僅支援 Gemini API Key（GEMINI_API_KEY secret）。
name: '執行小龍蝦任務 #N'

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to process'
        required: true
        type: string
      comment_id:
        description: 'Existing issue comment ID to reuse for progress updates'
        required: false
        type: string
      user_comment_id:
        description: 'User comment ID used to locate artifacts/{user_comment_id}/user.md'
        required: false
        type: string
      event_source:
        description: 'Who is triggering this workflow: cron or issue'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - cron
          - issue
      event_data:
        description: 'Additional data related to the event that triggered this workflow'
        required: false
        type: string
        default: ''
  repository_dispatch:
    types: [summarize-content]

run-name: "📝 摘要生成 Issue #${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"

concurrency:
  group: "summarize-content-${{ github.repository }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  ISSUE_NUMBER: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_id || inputs.comment_id }}"
  GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

jobs:
  run-summarize-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 把目標 repo 檢出到 runner，切換到對應 issue branch。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: "issue-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
          fetch-depth: 1
          token: "${{ github.token }}"

      # 先把 Node.js 環境準備好。
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 安裝 Bun
      - uses: oven-sh/setup-bun@v2

      # 安裝相關套件
      - run: bun install --no-fund --no-audit @google/genai @mozilla/readability linkedom

      - name: 狀態更新處理
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data == 'StatusUpdate') || inputs.event_data == 'StatusUpdate' }}
        shell: bash
        run: |
          echo "StatusUpdate event detected, performing status update..."

      # ── 執行內容摘要任務 ──────────────────────────────────────────────────
      # 從 issue.md 讀取目標 URL 或檔案路徑，使用 GoogleGenAI SDK 生成摘要並儲存到 artifacts 目錄。
      - name: 執行任務
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        id: summarize
        shell: bash
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          ISSUE_DIR: "artifacts/${{ env.COMMENT_ID }}"
          PROMPT_FILE: "./issue.md"
          SUMMARIZE_SCRIPT: "${{ github.workspace }}/scripts/summarize-inline.mjs"
        run: |
          set -euo pipefail

          if [[ ! -f "${PROMPT_FILE}" ]]; then
            echo "::error::${PROMPT_FILE} 不存在。請確認根目錄已正確建立並包含 issue.md。"
            exit 1
          fi

          # 從 issue.md 全文中找第一個 URL；若無 URL 則取第一個非 # 開頭的非空行（檔案路徑情境）
          INPUT_TARGET="$(grep -m1 -oE 'https?://[^[:space:]]+' "${PROMPT_FILE}" | head -1)"
          if [[ -z "${INPUT_TARGET}" ]]; then
            INPUT_TARGET="$(grep -m1 -v '^[[:space:]]*#' "${PROMPT_FILE}" | grep -m1 '[^[:space:]]' | tr -d '[:space:]')"
          fi
          if [[ -z "${INPUT_TARGET}" ]]; then
            echo "::error::${PROMPT_FILE} 中找不到有效的 URL 或檔案路徑"
            exit 1
          fi

          echo "::notice::摘要目標：${INPUT_TARGET}"

          # 使用 GoogleGenAI SDK 呼叫 Gemini 生成摘要
          summary="$(INPUT_TARGET="${INPUT_TARGET}" bun run "${SUMMARIZE_SCRIPT}")"

          if [[ -z "${summary// /}" ]]; then
            echo "::error::summarize-inline.mjs 未回傳任何摘要內容"
            exit 1
          fi

          mkdir -p "${ISSUE_DIR}"
          result_file="${ISSUE_DIR}/result.md"

          {
            printf '📝 內容摘要完成！\n\n'
            printf '%s\n\n' "${summary}"
          } > "${result_file}"

          echo "::notice::摘要完成，結果已寫入 ${result_file}"

      # 推送結果到 issue branch。
      - name: 推送結果
        if: always()
        uses: duotify/GitHubClawToolkit/actions/commit-push-issue-branch-action@v1.1.1
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}

      - name: 任務失敗處理
        if: failure() && steps.summarize.conclusion == 'failure'
        uses: duotify/GitHubClawToolkit/actions/error-handler-action@v1.1.1
        with:
          output_file: "artifacts/${{ env.COMMENT_ID }}/result.md"
          result_file: "artifacts/${{ env.COMMENT_ID }}/result.md"

      - name: 執行結果回報
        if: always()
        uses: duotify/GitHubClawToolkit/actions/update-comment-action@v1.1.1
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}
          comment_id: ${{ env.COMMENT_ID }}
          message_file: "artifacts/${{ env.COMMENT_ID }}/result.md"
