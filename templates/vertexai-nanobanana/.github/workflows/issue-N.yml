# 圖片生成 workflow。
# 使用 Vertex AI 模型（內嵌 Node.js 腳本），從 artifacts/<comment-id>/user.md 讀取 user prompt，並參考根目錄 jsonl 上下文，
# 生成圖片並 commit 到 issue branch，最後回寫 issue comment。
#
# 認證模式：僅支援 Vertex AI API Key（VERTEXAI_API_KEY secret）。
name: '執行小龍蝦任務 #N'

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to process'
        required: true
        type: string
      comment_id:
        description: 'Existing issue comment ID to reuse for progress updates'
        required: false
        type: string
      user_comment_id:
        description: 'User issue comment ID used to locate artifacts/{user_comment_id}/user.md'
        required: false
        type: string
      event_source:
        description: 'Who is triggering this workflow: cron or issue'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - cron
          - issue
      event_data:
        description: 'Additional data related to the event that triggered this workflow'
        required: false
        type: string
        default: ''
      model:
        description: 'Vertex 圖片生成模型名稱'
        required: false
        default: 'gemini-2.5-flash-image'
        type: string
  repository_dispatch:
    types: [create-image]

run-name: "🍌 Create Image Issue #${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"

concurrency:
  group: "create-image-${{ github.repository }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  ISSUE_NUMBER: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
  COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_id || inputs.comment_id }}"
  USER_COMMENT_ID: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.user_comment_id || inputs.user_comment_id }}"
  MODEL: "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.model || inputs.model || 'gemini-2.5-flash-image' }}"
  VERTEXAI_API_KEY: "${{ secrets.VERTEXAI_API_KEY }}"

jobs:
  run-create-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: "issue-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.issue_number || inputs.issue_number }}"
          fetch-depth: 1
          token: "${{ github.token }}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - run: bun install --no-fund --no-audit @google/genai

      - name: 狀態更新處理
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data == 'StatusUpdate') || inputs.event_data == 'StatusUpdate' }}
        shell: bash
        run: |
          echo "StatusUpdate event detected, performing status update..."

      - name: 執行任務
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.event_data != 'StatusUpdate') || inputs.event_data != 'StatusUpdate' }}
        id: generate
        shell: bash
        env:
          VERTEXAI_API_KEY: ${{ env.VERTEXAI_API_KEY }}
          NANOBANANA_MODEL: ${{ env.MODEL }}
          ISSUE_DIR: "./artifacts/${{ env.COMMENT_ID }}"
          SYSTEM_PROMPT_FILE: "./SYSTEM.md"
          TEMPLATE_ROOT: "."
          GENERATE_SCRIPT: "./scripts/generate-image.ts"
          NAME_PREFIX: "image-${{ env.COMMENT_ID || env.ISSUE_NUMBER }}"
        run: |
          set -euo pipefail

          prompt_comment_id="${USER_COMMENT_ID:-${COMMENT_ID}}"
          PROMPT_FILE="./artifacts/${prompt_comment_id}/user.md"

          if [[ ! -f "${PROMPT_FILE}" ]]; then
            echo "::error::${PROMPT_FILE} 不存在。請確認 issue branch 已建立 artifacts/${prompt_comment_id}/user.md。"
            exit 1
          fi

          echo "::notice::將使用 ${PROMPT_FILE} 作為 user prompt"
          output="$(PROMPT_FILE="${PROMPT_FILE}" SYSTEM_PROMPT_FILE="${SYSTEM_PROMPT_FILE}" TEMPLATE_ROOT="${TEMPLATE_ROOT}" ISSUE_DIR="${ISSUE_DIR}" NAME_PREFIX="${NAME_PREFIX}" NANOBANANA_MODEL="${NANOBANANA_MODEL}" bun run "${GENERATE_SCRIPT}")"
          echo "${output}"

          saved_files="$(echo "${output}" | grep '^Saved: ' | sed 's/^Saved: //' | paste -sd ',' -)"

          if [[ -z "${saved_files}" ]]; then
            echo "::error::未找到生成的圖片檔案路徑"
            exit 1
          fi

          echo "saved_files=${saved_files}" >> "$GITHUB_OUTPUT"
          echo "::notice::生成完成：${saved_files}"

          branch_name="issue-${{ env.ISSUE_NUMBER }}"
          result_file="${ISSUE_DIR}/result.md"

          {
            printf '🎨 圖片生成完成！\n\n'
            IFS=',' read -ra files <<< "${saved_files}"
            for f in "${files[@]}"; do
              filename="$(basename "${f}")"
              url="https://github.com/${GITHUB_REPOSITORY}/blob/${branch_name}/${f}?raw=true"
              printf '![%s](%s)\n\n' "${filename}" "${url}"
            done
          } > "${result_file}"

      - name: 推送結果
        if: always()
        shell: bash
        env:
          SAVED_FILES: ${{ steps.generate.outputs.saved_files }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "${SAVED_FILES:-}" ]]; then
            IFS=',' read -ra files <<< "${SAVED_FILES}"
            for f in "${files[@]}"; do
              [[ -n "${f}" ]] && git add "${f}"
            done
          fi

          if [[ -f "artifacts/${COMMENT_ID}/result.md" ]]; then
            git add "artifacts/${COMMENT_ID}/result.md"
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add generated vertex images for issue #${{ env.ISSUE_NUMBER }}"
          fi
          git push origin "issue-${{ env.ISSUE_NUMBER }}" --force

      - name: 任務失敗處理
        if: failure() && steps.generate.conclusion == 'failure'
        uses: duotify/GitHubClawToolkit/actions/error-handler-action@v1.1.0
        with:
          output_file: "artifacts/${{ env.COMMENT_ID }}/result.md"
          result_file: "artifacts/${{ env.COMMENT_ID }}/result.md"

      - name: 執行結果回報
        if: always()
        uses: duotify/GitHubClawToolkit/actions/update-comment-action@v1.1.0
        with:
          issue_number: ${{ env.ISSUE_NUMBER }}
          comment_id: ${{ env.COMMENT_ID }}
          message_file: "artifacts/${{ env.COMMENT_ID }}/result.md"
